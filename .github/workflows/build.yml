name: Build and Auto-Update

on:
  schedule:
    - cron: '0 0 * * *' # Daily check
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Upstream Updates
        id: check_upstream
        run: |
          # Get current config
          UPSTREAM_URL=$(grep "^upstreamUrl=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          OLD_REF=$(grep "^upstreamRef=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          
          echo "Current Upstream Ref: $OLD_REF"
          
          # Get the latest commit hash from the remote master branch
          NEW_REF=$(git ls-remote "$UPSTREAM_URL" master | awk '{ print $1 }')
          
          if [ -n "$NEW_REF" ] && [ "$NEW_REF" != "$OLD_REF" ]; then
            echo "Upstream changed! New Ref: $NEW_REF"
            sed -i "s/^upstreamRef=.*/upstreamRef=$NEW_REF/" gradle.properties
            
            # Configure Git and commit changes
            git config --global user.email "github-actions@github.com"
            git config --global user.name "github-actions"
            git add gradle.properties
            git commit -m "chore: update upstreamRef to $NEW_REF [skip ci]"
            git push
            
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "new_ref=$NEW_REF" >> $GITHUB_OUTPUT
          else
            echo "No upstream changes detected."
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "new_ref=$OLD_REF" >> $GITHUB_OUTPUT
          fi

      - name: Should Continue
        id: should_continue
        run: |
          if [ "${{ github.event_name }}" != "schedule" ] || [ "${{ steps.check_upstream.outputs.updated }}" == "true" ]; then
            echo "continue=true" >> $GITHUB_OUTPUT
          else
            echo "continue=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git for Setup
        if: steps.should_continue.outputs.continue == 'true'
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

      - name: Run Setup
        if: steps.should_continue.outputs.continue == 'true'
        run: |
          chmod +x setup.sh
          ./setup.sh

      - name: Set up JDK 25
        if: steps.should_continue.outputs.continue == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        if: steps.should_continue.outputs.continue == 'true'
        run: |
          cd src
          mvn clean package -DskipTests

      - name: Get Version and Artifact
        if: steps.should_continue.outputs.continue == 'true'
        id: get_info
        run: |
          cd src
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Project Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Find the shaded jar in common/target
          JAR_FILE=$(ls common/target/InteractiveChat-DiscordSRV-Addon-common-*.jar 2>/dev/null | grep -v "original" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            # Fallback to any jar in common/target if specific naming fails
            JAR_FILE=$(ls common/target/*.jar 2>/dev/null | grep -v "original" | head -n 1)
          fi
          
          if [ -z "$JAR_FILE" ]; then
            echo "Error: No jar file found!"
            exit 1
          fi
          
          echo "Found JAR: $JAR_FILE"
          echo "jar_path=src/$JAR_FILE" >> $GITHUB_OUTPUT
          echo "sha1=$(sha1sum $JAR_FILE | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.should_continue.outputs.continue == 'true' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_info.outputs.version }}-${{ github.run_number }}
          name: Build v${{ steps.get_info.outputs.version }} (Build ${{ github.run_number }})
          body: |
            Upstream Ref: `${{ steps.check_upstream.outputs.new_ref }}`
            Auto-updated: `${{ steps.check_upstream.outputs.updated }}`
            JAR SHA1: `${{ steps.get_info.outputs.sha1 }}`
          draft: false
          prerelease: false
          files: |
            ${{ steps.get_info.outputs.jar_path }}
